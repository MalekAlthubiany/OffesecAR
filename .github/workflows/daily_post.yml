name: نشر يومي - OffsecAR

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت خطوط عربية
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-core fonts-noto-extra fonts-noto-ui-core libfreetype6-dev

      - name: تثبيت المكتبات
        run: |
          pip install --quiet anthropic tweepy feedparser Pillow requests

      - name: تشغيل سكريبت الأخبار اليومية
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_HANDLE:               ${{ secrets.TWITTER_HANDLE }}
        run: python scripts/daily_post.py

      - name: توليد مقالة Blog اليوم
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py

      - name: رفع التغييرات
        run: |
          git config user.name  "offsecAR-bot"
          git config user.email "bot@offsecAR.github.io"
          git add _posts/ _blogs/ assets/images/
          git diff --staged --quiet || git commit -m "📰 $(date +'%Y-%m-%d') · خبر + مقالة"
          git push
